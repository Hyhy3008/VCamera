name: VCamera Emergency Build

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Setup Java 11
      uses: actions/setup-java@v4
      with:
        java-version: '11'
        distribution: 'temurin'
    
    - name: Clone and rebuild from scratch
      run: |
        echo "=== BYPASS CACHE - CLONE TO NEW DIRECTORY ==="
        
        # Clone to temp directory (bypass any cache)
        cd /tmp
        git clone https://github.com/${{ github.repository }}.git vcamera-build
        cd vcamera-build
        
        echo "=== REMOVE ALL BUILD FILES ==="
        # Remove EVERYTHING gradle related
        find . -name "build.gradle*" -delete
        find . -name "settings.gradle*" -delete
        find . -name "gradle*" -delete
        find . -name ".gradle" -type d -exec rm -rf {} + 2>/dev/null || true
        find . -type f -name "*.properties" -path "*/gradle/*" -delete
        rm -rf gradle/ gradlew* build/ app/build/
        
        echo "=== CREATE SIMPLE ANDROID PROJECT ==="
        
        # 1. Create build.gradle (root)
        cat > build.gradle << 'EOF'
        buildscript {
            repositories {
                google()
                jcenter()
            }
            dependencies {
                classpath 'com.android.tools.build:gradle:3.5.3'
            }
        }
        
        allprojects {
            repositories {
                google()
                jcenter()
            }
        }
        EOF
        
        # 2. Create settings.gradle  
        echo 'include ":app"' > settings.gradle
        
        # 3. Create app/build.gradle (SIMPLE!)
        cat > app/build.gradle << 'EOF'
        apply plugin: 'com.android.application'
        
        android {
            compileSdkVersion 29
            
            defaultConfig {
                applicationId "virtual.camera.app"
                minSdkVersion 21
                targetSdkVersion 29
                versionCode 1
                versionName "1.0"
            }
            
            buildTypes {
                release {
                    minifyEnabled false
                }
            }
        }
        
        dependencies {
            implementation 'androidx.appcompat:appcompat:1.1.0'
        }
        EOF
        
        # 4. Create minimal App.java (not Kotlin!)
        mkdir -p app/src/main/java/virtual/camera/app/app
        cat > app/src/main/java/virtual/camera/app/app/App.java << 'EOF'
        package virtual.camera.app.app;
        import android.app.Application;
        public class App extends Application {}
        EOF
        
        # 5. Create MainActivity
        mkdir -p app/src/main/java/virtual/camera/app
        cat > app/src/main/java/virtual/camera/app/MainActivity.java << 'EOF'
        package virtual.camera.app;
        import android.app.Activity;
        import android.os.Bundle;
        public class MainActivity extends Activity {
            protected void onCreate(Bundle savedInstanceState) {
                super.onCreate(savedInstanceState);
            }
        }
        EOF
        
        # 6. Create/Update AndroidManifest.xml
        if [ ! -f "app/src/main/AndroidManifest.xml" ]; then
          mkdir -p app/src/main
          cat > app/src/main/AndroidManifest.xml << 'EOF'
        <?xml version="1.0" encoding="utf-8"?>
        <manifest xmlns:android="http://schemas.android.com/apk/res/android"
            package="virtual.camera.app">
            
            <application
                android:name=".app.App"
                android:allowBackup="true"
                android:label="VCamera"
                android:theme="@style/Theme.AppCompat.Light">
                
                <activity android:name=".MainActivity"
                    android:exported="true">
                    <intent-filter>
                        <action android:name="android.intent.action.MAIN" />
                        <category android:name="android.intent.category.LAUNCHER" />
                    </intent-filter>
                </activity>
            </application>
        </manifest>
        EOF
        fi
        
        echo "=== DOWNLOAD AND USE GRADLE DIRECTLY ==="
        # Download gradle zip
        wget -q https://services.gradle.org/distributions/gradle-5.6.4-bin.zip
        unzip -q gradle-5.6.4-bin.zip
        
        echo "=== BUILD WITH GRADLE 5.6.4 ==="
        # Build directly with gradle (no wrapper)
        ./gradle-5.6.4/bin/gradle clean assembleDebug --no-daemon --stacktrace
        
        echo "=== CHECK RESULTS ==="
        find . -name "*.apk" -exec ls -lh {} \;
        
        # Copy APK to workspace
        mkdir -p $GITHUB_WORKSPACE/output
        cp -v app/build/outputs/apk/debug/*.apk $GITHUB_WORKSPACE/output/ || echo "No APK found"

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: VCamera-emergency-build
        path: output/*.apk
        retention-days: 7
