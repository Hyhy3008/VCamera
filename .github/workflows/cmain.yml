name: Android CI Build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Fix Gradle Wrapper structure
      run: |
        mkdir -p gradle/wrapper
        [ -f "gradle-wrapper.jar" ] && mv gradle-wrapper.jar gradle/wrapper/
        [ -f "gradle-wrapper.properties" ] && mv gradle-wrapper.properties gradle/wrapper/
        ls -la gradle/wrapper/

    - name: Remove missing opensdk module
      run: |
        echo "=== Fixing missing opensdk module ==="
        
        # Xóa opensdk khỏi settings.gradle
        sed -i "/include.*:opensdk/d" settings.gradle
        
        # Xóa dependency opensdk khỏi app/build.gradle
        sed -i "/implementation project(':opensdk')/d" app/build.gradle
        
        # Xóa dependency camera nếu không có
        sed -i "/implementation 'virtual.camera.camera:camera:/d" app/build.gradle
        
        echo "=== Updated settings.gradle ==="
        cat settings.gradle
        
        echo -e "\n=== Updated app/build.gradle (dependencies section) ==="
        grep -A 50 "dependencies {" app/build.gradle || true

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Sync Gradle dependencies
      run: ./gradlew dependencies --stacktrace || true

    - name: Clean build
      run: ./gradlew clean --stacktrace

    - name: Build Debug APK
      run: ./gradlew assembleDebug --stacktrace --no-daemon

    - name: List built APKs
      if: always()
      run: |
        echo "=== Build outputs ==="
        find app/build/outputs -name "*.apk" -exec ls -lh {} \; || echo "No APK found"

    - name: Upload Debug APK
      uses: actions/upload-artifact@v4
      if: success()
      with:
        name: vcamera-debug-apk
        path: app/build/outputs/apk/debug/*.apk
        retention-days: 7
