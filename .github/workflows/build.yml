name: VCamera Build

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 11  
      uses: actions/setup-java@v4
      with:
        java-version: '11'
        distribution: 'temurin'

    - name: Fix project structure
      run: |
        echo "=== Step 1: Fix Gradle Wrapper ==="
        mkdir -p gradle/wrapper
        [ -f gradle-wrapper.jar ] && mv gradle-wrapper.jar gradle/wrapper/
        [ -f gradle-wrapper.properties ] && mv gradle-wrapper.properties gradle/wrapper/
        
        # Gradle 6.7.1 (compatible)
        cat > gradle/wrapper/gradle-wrapper.properties << 'EOF'
        distributionBase=GRADLE_USER_HOME
        distributionPath=wrapper/dists
        distributionUrl=https\://services.gradle.org/distributions/gradle-6.7.1-bin.zip
        zipStoreBase=GRADLE_USER_HOME
        zipStorePath=wrapper/dists
        EOF
        
        # Download wrapper JAR
        curl -sL https://github.com/gradle/gradle/raw/v6.7.1/gradle/wrapper/gradle-wrapper.jar \
             -o gradle/wrapper/gradle-wrapper.jar
        
        echo "=== Step 2: Create fake HackApplication ==="
        mkdir -p app/src/main/java/com/hack/opensdk
        
        cat > app/src/main/java/com/hack/opensdk/HackApplication.java << 'EOF'
        package com.hack.opensdk;
        import android.app.Application;
        
        public class HackApplication extends Application {
            @Override
            public void onCreate() {
                super.onCreate();
            }
        }
        EOF
        
        echo "=== Step 3: Fix build.gradle files ==="
        
        # Root build.gradle
        cat > build.gradle << 'EOF'
        buildscript {
            ext.kotlin_version = '1.4.32'
            repositories {
                google()
                mavenCentral()
                jcenter()
            }
            dependencies {
                classpath 'com.android.tools.build:gradle:4.1.3'
                classpath "org.jetbrains.kotlin:kotlin-gradle-plugin:$kotlin_version"
            }
        }
        
        allprojects {
            repositories {
                google()
                mavenCentral()
                jcenter()
                maven { url 'https://jitpack.io' }
            }
        }
        
        ext {
            compileSdkVersion = 30
            minSdkVersion = 21
            targetSdkVersion = 30
            versionCode = 1
            versionName = "1.0"
            masterPkg = "virtual.camera.app"
        }
        
        task clean(type: Delete) {
            delete rootProject.buildDir
        }
        EOF
        
        # settings.gradle - remove opensdk
        echo 'include ":app"' > settings.gradle
        echo 'rootProject.name = "VCamera"' >> settings.gradle
        
        # Update app/build.gradle
        cat > app/build.gradle << 'EOF'
        plugins {
            id 'com.android.application'
            id 'kotlin-android'
        }
        
        android {
            compileSdkVersion rootProject.ext.compileSdkVersion
            
            defaultConfig {
                applicationId rootProject.ext.masterPkg
                minSdkVersion rootProject.ext.minSdkVersion
                targetSdkVersion rootProject.ext.targetSdkVersion
                versionCode rootProject.ext.versionCode
                versionName rootProject.ext.versionName
            }
            
            buildTypes {
                debug {
                    minifyEnabled false
                }
                release {
                    minifyEnabled false
                }
            }
            
            buildFeatures {
                viewBinding false
                dataBinding false
            }
            
            kotlinOptions {
                jvmTarget = '1.8'
            }
            
            compileOptions {
                sourceCompatibility JavaVersion.VERSION_1_8
                targetCompatibility JavaVersion.VERSION_1_8
            }
            
            lintOptions {
                abortOnError false
            }
        }
        
        dependencies {
            implementation fileTree(dir: "libs", include: ["*.jar", "*.aar"])
            
            // Android core
            implementation 'androidx.core:core-ktx:1.3.2'
            implementation 'androidx.appcompat:appcompat:1.3.0'
            implementation 'com.google.android.material:material:1.3.0'
            implementation 'androidx.constraintlayout:constraintlayout:2.0.4'
            
            // Kotlin
            implementation "org.jetbrains.kotlin:kotlin-stdlib:$kotlin_version"
        }
        EOF
        
        echo "=== Step 4: Check AndroidManifest ==="
        if [ -f "app/src/main/AndroidManifest.xml" ]; then
          echo "AndroidManifest.xml exists"
          # Make sure App class is registered
          sed -i 's|android:name="[^"]*"|android:name="virtual.camera.app.app.App"|' app/src/main/AndroidManifest.xml || true
        else
          echo "Creating minimal AndroidManifest.xml"
          mkdir -p app/src/main
          cat > app/src/main/AndroidManifest.xml << 'EOF'
        <?xml version="1.0" encoding="utf-8"?>
        <manifest xmlns:android="http://schemas.android.com/apk/res/android"
            package="virtual.camera.app">
            
            <application
                android:name=".app.App"
                android:allowBackup="true"
                android:icon="@mipmap/ic_launcher"
                android:label="VCamera"
                android:theme="@style/Theme.AppCompat.Light">
                
                <activity android:name=".MainActivity"
                    android:exported="true">
                    <intent-filter>
                        <action android:name="android.intent.action.MAIN" />
                        <category android:name="android.intent.category.LAUNCHER" />
                    </intent-filter>
                </activity>
            </application>
        </manifest>
        EOF
        fi

    - name: Grant execute permission
      run: chmod +x gradlew

    - name: Clean build
      run: ./gradlew clean

    - name: Build Debug APK
      run: ./gradlew assembleDebug --stacktrace

    - name: Upload APK
      if: success()
      uses: actions/upload-artifact@v4
      with:
        name: VCamera-debug
        path: app/build/outputs/apk/debug/*.apk
        retention-days: 30

    - name: Build summary
      if: always()
      run: |
        echo "### Build Summary" >> $GITHUB_STEP_SUMMARY
        if [ -f "app/build/outputs/apk/debug/app-debug.apk" ]; then
          echo "✅ Build SUCCESS" >> $GITHUB_STEP_SUMMARY
          ls -lh app/build/outputs/apk/debug/*.apk >> $GITHUB_STEP_SUMMARY
        else
          echo "❌ Build FAILED" >> $GITHUB_STEP_SUMMARY
        fi
