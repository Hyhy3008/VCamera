name: Android CI Build - Minimal

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up JDK 11
      uses: actions/setup-java@v4
      with:
        java-version: '11'
        distribution: 'temurin'

    - name: Create minimal project structure
      run: |
        echo "=== Creating minimal build structure ==="
        
        # Fix Gradle wrapper
        mkdir -p gradle/wrapper
        [ -f "gradle-wrapper.jar" ] && mv gradle-wrapper.jar gradle/wrapper/
        [ -f "gradle-wrapper.properties" ] && mv gradle-wrapper.properties gradle/wrapper/
        
        # Force Gradle 6.7.1 (stable for old projects)
        cat > gradle/wrapper/gradle-wrapper.properties << 'EOF'
        distributionBase=GRADLE_USER_HOME
        distributionPath=wrapper/dists
        distributionUrl=https\://services.gradle.org/distributions/gradle-6.7.1-all.zip
        zipStoreBase=GRADLE_USER_HOME
        zipStorePath=wrapper/dists
        EOF
        
        # Create minimal root build.gradle
        cat > build.gradle << 'EOF'
        buildscript {
            ext.kotlin_version = '1.4.32'
            
            repositories {
                google()
                mavenCentral()
                jcenter()
            }
            
            dependencies {
                classpath 'com.android.tools.build:gradle:4.1.3'
                classpath "org.jetbrains.kotlin:kotlin-gradle-plugin:$kotlin_version"
            }
        }
        
        allprojects {
            repositories {
                google()
                mavenCentral()
                jcenter()
                maven { url 'https://jitpack.io' }
                flatDir {
                    dirs 'libs', 'app/libs'
                }
            }
        }
        
        ext {
            compileSdkVersion = 30
            minSdkVersion = 21
            targetSdkVersion = 30
            versionCode = 1
            versionName = "1.0"
            masterPkg = "virtual.camera.app"
        }
        
        task clean(type: Delete) {
            delete rootProject.buildDir
        }
        EOF
        
        # Update settings.gradle - remove opensdk
        echo 'include ":app"' > settings.gradle
        echo 'rootProject.name = "VCamera"' >> settings.gradle
        
        # Create minimal app/build.gradle
        cat > app/build.gradle << 'EOF'
        plugins {
            id 'com.android.application'
            id 'kotlin-android'
        }
        
        android {
            compileSdkVersion rootProject.ext.compileSdkVersion
            
            defaultConfig {
                applicationId rootProject.ext.masterPkg
                minSdkVersion rootProject.ext.minSdkVersion
                targetSdkVersion rootProject.ext.targetSdkVersion
                versionCode rootProject.ext.versionCode
                versionName rootProject.ext.versionName
            }
            
            buildTypes {
                debug {
                    minifyEnabled false
                }
                release {
                    minifyEnabled false
                }
            }
            
            // DISABLE all problematic features
            buildFeatures {
                viewBinding false
                dataBinding false
            }
            
            kotlinOptions {
                jvmTarget = '1.8'
            }
            
            compileOptions {
                sourceCompatibility JavaVersion.VERSION_1_8
                targetCompatibility JavaVersion.VERSION_1_8
            }
            
            lintOptions {
                abortOnError false
            }
        }
        
        dependencies {
            implementation fileTree(dir: "libs", include: ["*.jar", "*.aar"])
            
            // Core Android dependencies only
            implementation 'androidx.core:core-ktx:1.3.2'
            implementation 'androidx.appcompat:appcompat:1.3.0'
            implementation 'com.google.android.material:material:1.3.0'
            implementation 'androidx.constraintlayout:constraintlayout:2.0.4'
            
            // Kotlin
            implementation "org.jetbrains.kotlin:kotlin-stdlib:$kotlin_version"
        }
        EOF
        
        echo "=== Build files created ==="
        cat build.gradle

    - name: Download Gradle Wrapper JAR
      run: |
        if [ ! -f "gradle/wrapper/gradle-wrapper.jar" ]; then
          curl -L https://github.com/gradle/gradle/raw/v6.7.1/gradle/wrapper/gradle-wrapper.jar \
               -o gradle/wrapper/gradle-wrapper.jar
        fi
        ls -la gradle/wrapper/

    - name: Grant execute permission
      run: chmod +x gradlew

    - name: Check project structure
      run: |
        echo "=== Project structure ==="
        find app/src/main -type f -name "*.java" -o -name "*.kt" | head -10
        
        echo -e "\n=== AndroidManifest.xml ==="
        cat app/src/main/AndroidManifest.xml || echo "Missing AndroidManifest.xml"

    - name: Clean project
      run: ./gradlew clean --stacktrace --info

    - name: Build Debug APK
      run: ./gradlew assembleDebug --stacktrace --info

    - name: List outputs
      if: always()
      run: |
        echo "=== APK outputs ==="
        find . -name "*.apk" -exec ls -lh {} \;
        
        echo -e "\n=== Build directory ==="
        ls -la app/build/outputs/apk/debug/ || echo "No debug APK directory"

    - name: Upload Debug APK
      uses: actions/upload-artifact@v4
      if: success()
      with:
        name: VCamera-debug
        path: app/build/outputs/apk/debug/*.apk
        retention-days: 14
