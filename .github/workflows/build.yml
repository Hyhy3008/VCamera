name: Android CI Build

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up JDK 11
      uses: actions/setup-java@v4
      with:
        java-version: '11'
        distribution: 'temurin'

    - name: Fix Gradle structure and versions
      run: |
        echo "=== Fixing Gradle Wrapper ==="
        mkdir -p gradle/wrapper
        
        # Move wrapper files
        [ -f "gradle-wrapper.jar" ] && mv gradle-wrapper.jar gradle/wrapper/
        [ -f "gradle-wrapper.properties" ] && mv gradle-wrapper.properties gradle/wrapper/
        
        # Force Gradle 7.5.1 (compatible with older Android Gradle Plugin)
        cat > gradle/wrapper/gradle-wrapper.properties << 'EOF'
        distributionBase=GRADLE_USER_HOME
        distributionPath=wrapper/dists
        distributionUrl=https\://services.gradle.org/distributions/gradle-7.5.1-all.zip
        zipStoreBase=GRADLE_USER_HOME
        zipStorePath=wrapper/dists
        EOF
        
        echo "Gradle wrapper properties:"
        cat gradle/wrapper/gradle-wrapper.properties

    - name: Update build.gradle files
      run: |
        echo "=== Updating root build.gradle ==="
        
        # Update or create root build.gradle with compatible versions
        cat > build.gradle << 'EOF'
        buildscript {
            ext.kotlin_version = '1.6.21'
            
            repositories {
                google()
                mavenCentral()
                jcenter()
            }
            
            dependencies {
                classpath 'com.android.tools.build:gradle:7.2.2'
                classpath "org.jetbrains.kotlin:kotlin-gradle-plugin:$kotlin_version"
            }
        }
        
        allprojects {
            repositories {
                google()
                mavenCentral()
                jcenter()
                maven { url 'https://jitpack.io' }
            }
        }
        
        ext {
            compileSdkVersion = 33
            minSdkVersion = 21
            targetSdkVersion = 33
            versionCode = 1
            versionName = "1.0"
            masterPkg = "virtual.camera.app"
        }
        
        task clean(type: Delete) {
            delete rootProject.buildDir
        }
        EOF
        
        echo "Updated build.gradle:"
        cat build.gradle

    - name: Remove missing dependencies
      run: |
        echo "=== Removing missing opensdk ==="
        
        # Remove from settings.gradle
        sed -i "/include.*:opensdk/d" settings.gradle
        
        # Remove from app/build.gradle
        sed -i "/implementation project(':opensdk')/d" app/build.gradle
        sed -i "/implementation 'virtual.camera.camera:camera:/d" app/build.gradle
        
        # Disable viewBinding if causing issues
        sed -i 's/viewBinding true/viewBinding false/' app/build.gradle
        
        echo "Updated settings.gradle:"
        cat settings.gradle

    - name: Grant execute permission
      run: chmod +x gradlew

    - name: Download Gradle Wrapper JAR if missing
      run: |
        if [ ! -f "gradle/wrapper/gradle-wrapper.jar" ]; then
          echo "Downloading gradle-wrapper.jar..."
          curl -L https://github.com/gradle/gradle/raw/v7.5.1/gradle/wrapper/gradle-wrapper.jar \
               -o gradle/wrapper/gradle-wrapper.jar
        fi
        
        ls -la gradle/wrapper/

    - name: Clean project
      run: ./gradlew clean --stacktrace || true

    - name: Build Debug APK
      run: ./gradlew assembleDebug --stacktrace --no-daemon

    - name: List outputs
      if: always()
      run: |
        find . -name "*.apk" -type f -exec ls -lh {} \; || echo "No APK found"

    - name: Upload Debug APK
      uses: actions/upload-artifact@v4
      if: success()
      with:
        name: VCamera-debug
        path: app/build/outputs/apk/debug/*.apk
        retention-days: 14
